backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "content/home.json"
        label: "Home Page"
        name: "home"
        format: "json"
        fields:
          - {label: "Hero Eyebrow", name: "hero_eyebrow", widget: "string"}
          - {label: "Hero Heading", name: "hero_heading", widget: "string"}
          - {label: "Hero Subtext", name: "hero_subtext", widget: "text"}
          - {label: "Hero CTA Text", name: "hero_cta_text", widget: "string"}
          - {label: "Hero CTA Link", name: "hero_cta_link", widget: "string"}
          - {label: "Contact Phone", name: "contact_phone", widget: "string"}
          - {label: "Contact Email", name: "contact_email", widget: "string"}
          - {label: "Contact Website", name: "contact_website", widget: "string"}
          - {label: "About Eyebrow", name: "about_eyebrow", widget: "string"}
          - {label: "About Heading", name: "about_heading", widget: "string"}
          - {label: "About Text", name: "about_text", widget: "markdown"}
          - {label: "About Image 1", name: "about_image_1", widget: "image"}
          - {label: "About Image 2", name: "about_image_2", widget: "image"}
          - {label: "About Features", name: "about_features", widget: "list"}
          - {label: "About Testimonial", name: "about_testimonial", widget: "string"}
          - {label: "Services Eyebrow", name: "services_eyebrow", widget: "string"}
          - {label: "Services Heading", name: "services_heading", widget: "string"}
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Image", name: "image", widget: "image"}
              - {label: "Link", name: "link", widget: "string"}
          - {label: "Adventure Eyebrow", name: "adventure_eyebrow", widget: "string"}
          - {label: "Adventure Heading", name: "adventure_heading", widget: "string"}
          - {label: "Adventure CTA Text", name: "adventure_cta_text", widget: "string"}
          - {label: "Adventure Box 1 Heading", name: "adventure_box1_heading", widget: "string"}
          - {label: "Adventure Box 2 Text", name: "adventure_box2_text", widget: "text"}
          - {label: "Adventure Box 2 Image", name: "adventure_box2_image", widget: "image"}
          - {label: "Adventure Box 3 Text", name: "adventure_box3_text", widget: "text"}
          - {label: "Adventure Box 3 Image", name: "adventure_box3_image", widget: "image"}
          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - {label: "Value", name: "value", widget: "string"}
              - {label: "Suffix", name: "suffix", widget: "string"}
              - {label: "Label", name: "label", widget: "string"}
          - {label: "Discover Eyebrow", name: "discover_eyebrow", widget: "string"}
          - {label: "Discover Heading", name: "discover_heading", widget: "string"}
          
      - file: "content/about.json"
        label: "About Us Page"
        name: "about"
        format: "json"
        fields:
          - label: "SEO Settings"
            name: "seo"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
          - label: "About Us"
            name: "aboutUs"
            widget: "object"
            fields:
              - {label: "Sub Title", name: "subTitle", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Image", name: "image", widget: "image"}
              - label: "Stats"
                name: "stats"
                widget: "object"
                fields:
                  - {label: "Number", name: "number", widget: "string"}
                  - {label: "Text", name: "text", widget: "string"}
              - {label: "Description", name: "description", widget: "markdown"}
          - label: "Fables Section"
            name: "fablesSection"
            widget: "object"
            fields:
              - {label: "Sub Title", name: "subTitle", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - label: "Fables"
                name: "fables"
                widget: "list"
                fields:
                  - {label: "Icon", name: "icon", widget: "string"}
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "text"}
          - label: "Amenities Section"
            name: "amenitiesSection"
            widget: "object"
            fields:
              - {label: "Sub Title", name: "subTitle", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - label: "Amenities"
                name: "amenities"
                widget: "list"
                fields:
                  - {label: "Icon Image", name: "iconImage", widget: "image"}
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "text"}
              - {label: "Footer List", name: "footerList", widget: "list"}
              
      - file: "content/contact.json"
        label: "Contact Us Page"
        name: "contact"
        format: "json"
        fields:
          - label: "SEO Settings"
            name: "seo"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
          - label: "Contact Info"
            name: "contactInfo"
            widget: "object"
            fields:
              - {label: "Phone", name: "phone", widget: "string"}
              - {label: "Tel Link", name: "tel", widget: "string"}
              - {label: "Website URL", name: "url", widget: "string"}
              - {label: "Email Address", name: "email", widget: "string"}
              - {label: "Mailto Link", name: "mailto", widget: "string"}
              - {label: "Location Address", name: "address", widget: "string"}
          - label: "Contact Form Labels"
            name: "contactForm"
            widget: "object"
            fields:
              - {label: "Sub Title", name: "subTitle", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
          - {label: "Google Map Embed URL", name: "googleMapUrl", widget: "string"}

      - file: "content/gallery.json"
        label: "Gallery Page"
        name: "gallery"
        format: "json"
        fields:
          - label: "SEO Settings"
            name: "seo"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
          - label: "Gallery Images"
            name: "galleryImages"
            widget: "list"
            fields:
              - {label: "Source", name: "src", widget: "image"}

  - name: "wayanad"
    label: "Wayanad Page"
    file: "content/wayanad.json"
    fields:
      - { label: "SEO Settings", name: "seo", widget: "object", fields: [
          { label: "Title", name: "title", widget: "string" },
          { label: "Description", name: "description", widget: "text" }
        ]}
      - { label: "Page Title", name: "title", widget: "string" }
      - { label: "Local Attractions", name: "attractions", widget: "list", fields: [
          { label: "Title", name: "title", widget: "string" },
          { label: "Description", name: "text", widget: "text" },
          { label: "Image", name: "image", widget: "image" },
          { label: "Link URL", name: "url", widget: "string" }
        ]}
      - { label: "Experiences", name: "experiences", widget: "list", fields: [
          { label: "Title", name: "title", widget: "string" },
          { label: "Description", name: "text", widget: "text" },
          { label: "Image", name: "image", widget: "image" }
        ]}
